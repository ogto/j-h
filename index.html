<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신정훈님의 CKPool 대시보드</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#f4f6fb;
margin:0;
padding:40px;
color:#222;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
font-size:34px;
margin-bottom:6px;
}

.sub{
color:#666;
font-size:14px;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
margin-bottom:20px;
}

.card{
background:white;
border-radius:18px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.label{
font-size:13px;
color:#777;
}

.value{
font-size:28px;
font-weight:700;
margin-top:4px;
}

.section{
background:white;
padding:24px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
margin-top:20px;
}

.bar{
height:10px;
background:#e7ecf8;
border-radius:8px;
overflow:hidden;
margin-top:8px;
}

.bar-inner{
height:10px;
background:linear-gradient(90deg,#6c8cff,#9fd1ff);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
text-align:left;
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
color:#888;
font-size:12px;
text-transform:uppercase;
}

button{
padding:10px 18px;
border-radius:10px;
border:none;
background:#5b7cff;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.status{
margin-top:10px;
font-size:13px;
color:#888;
}

</style>
</head>

<body>

<div class="container">

<h1>⛏ 신정훈님의 CKPool 데이터</h1>
<div class="sub" id="address"></div>

<button onclick="loadData()">새로고침</button>

<div class="grid">

<div class="card">
<div class="label">1분 해시레이트</div>
<div class="value" id="hash1m">-</div>
</div>

<div class="card">
<div class="label">1시간 해시레이트</div>
<div class="value" id="hash1h">-</div>
</div>

<div class="card">
<div class="label">총 shares</div>
<div class="value" id="shares">-</div>
</div>

<div class="card">
<div class="label">workers</div>
<div class="value" id="workers">-</div>
</div>

</div>

<div class="section">

<h3>해시레이트 흐름</h3>

<div>1m</div>
<div class="bar"><div class="bar-inner" id="bar1m"></div></div>

<div>5m</div>
<div class="bar"><div class="bar-inner" id="bar5m"></div></div>

<div>1h</div>
<div class="bar"><div class="bar-inner" id="bar1h"></div></div>

<div>1d</div>
<div class="bar"><div class="bar-inner" id="bar1d"></div></div>

</div>

<div class="section">

<h3>Worker 상태</h3>

<table>

<thead>
<tr>
<th>Worker</th>
<th>1m</th>
<th>1h</th>
<th>shares</th>
<th>bestshare</th>
</tr>
</thead>

<tbody id="workerTable"></tbody>

</table>

</div>

<div class="status" id="status"></div>

</div>

<script>

const ADDRESS = "BC1QX34GPNQTHCD89R7H40GP3J8QRJXUKH2388KLRQ"
const API = "/api/ckpool"

document.getElementById("address").innerText = "BTC 주소 : " + ADDRESS

function parseHash(v){

if(!v) return 0

let num=parseFloat(v)

if(v.includes("K")) num*=1e3
if(v.includes("M")) num*=1e6
if(v.includes("G")) num*=1e9
if(v.includes("T")) num*=1e12
if(v.includes("P")) num*=1e15

return num

}

function barWidth(val,max){

if(max===0) return 0

return (val/max)*100

}

async function loadData(){

document.getElementById("status").innerText="데이터 불러오는 중..."

try{

const res=await fetch(API)

const data=await res.json()

document.getElementById("hash1m").innerText=data.hashrate1m||"-"
document.getElementById("hash1h").innerText=data.hashrate1hr||"-"
document.getElementById("shares").innerText=data.shares||"-"
document.getElementById("workers").innerText=data.workers||"-"

const h1=parseHash(data.hashrate1m)
const h5=parseHash(data.hashrate5m)
const h1h=parseHash(data.hashrate1hr)
const h1d=parseHash(data.hashrate1d)

const max=Math.max(h1,h5,h1h,h1d)

document.getElementById("bar1m").style.width=barWidth(h1,max)+"%"
document.getElementById("bar5m").style.width=barWidth(h5,max)+"%"
document.getElementById("bar1h").style.width=barWidth(h1h,max)+"%"
document.getElementById("bar1d").style.width=barWidth(h1d,max)+"%"

const table=document.getElementById("workerTable")

table.innerHTML=""

if(data.worker){

data.worker.forEach(w=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${w.workername||"-"}</td>
<td>${w.hashrate1m||"-"}</td>
<td>${w.hashrate1hr||"-"}</td>
<td>${w.shares||"-"}</td>
<td>${Math.round(w.bestshare)||"-"}</td>
`

table.appendChild(tr)

})

}

document.getElementById("status").innerText="업데이트 : "+new Date().toLocaleString()

}catch(e){

document.getElementById("status").innerText="데이터 로드 실패"

}

}

loadData()

</script>

</body>
</html>
